name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Triggers on push to either main or master branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Node.js LTS ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Uses the latest Node.js LTS (v22)
          cache: 'npm'

      - name: Install Dependencies 🔧
        run: npm ci || npm install

      - name: Build static site 🏗️
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder where build files are output
          branch: gh-pages # The branch the action deploys to
